name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        emacs-version:
          - '28.1'
          - '29.4'
          - '30.1'
          - 'snapshot'
    steps:
      - uses: actions/checkout@v4
      - uses: jcs090218/setup-emacs@master
        with:
          version: ${{ matrix.emacs-version }}
      - uses: emacs-eask/setup-eask@master
        with:
          version: 'snapshot'
      - name: Install deps
        run: eask install-deps --dev
      - name: Byte-compile (strict)
        run: eask compile --strict
      - name: Run tests
        run: eask test buttercup

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jcs090218/setup-emacs@master
        with:
          version: '30.1'
      - uses: emacs-eask/setup-eask@master
        with:
          version: 'snapshot'
      - run: eask install-deps --dev
      - run: eask lint package
      - run: eask lint checkdoc
      - run: eask lint indent
